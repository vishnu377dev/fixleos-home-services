<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Registration - FixLeos</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <!-- Custom CSS for this page -->
    <link rel="stylesheet" href="css/style_register.css">  <!-- <<< UPDATED FILE NAME HERE -->

</head>






   
<body class="bg-light">

    <div class="container my-5">
        <div class="text-center mb-5">
            <img src="assets/logo.png" alt="FixLeos Logo" style="width: 150px;">
            <h1 class="mt-2">Become a Service Partner</h1>
            <p class="lead text-muted">Join our network and grow your business.</p>
        </div>

        <div class="card p-4 p-md-5 shadow-lg">
            <!-- Stepper -->
            <div id="stepper" class="d-flex justify-content-between mb-5">
                <div class="step-item active" data-step="1">
                    <div class="step-circle">1</div>
                    <div class="step-title">Personal Details</div>
                </div>
                <div class="step-item" data-step="2">
                    <div class="step-circle">2</div>
                    <div class="step-title">Services</div>
                </div>
                <div class="step-item" data-step="3">
                    <div class="step-circle">3</div>
                    <div class="step-title">KYC Documents</div>
                </div>
            </div>

            <form id="registration-form">
                <!-- Step 1: Personal Details -->
                <div class="form-step active" id="step-1">
                    <h3 class="mb-4 text-primary"><i class="fas fa-user-circle me-2"></i>Personal Information</h3>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control form-control-lg" id="fullName" placeholder="e.g., Ramesh Kumar">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="e.g., ramesh@example.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Mobile Number</label>
                            <input type="tel" class="form-control form-control-lg" id="phone" placeholder="10-digit mobile number">
                        </div>
                         <div class="col-md-6 mb-3">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control form-control-lg" id="city" placeholder="e.g., Delhi">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" class="btn btn-primary btn-lg next-btn">Next <i class="fas fa-arrow-right ms-2"></i></button>
                    </div>
                </div>

                <!-- Step 2: Service Selection -->
                <div class="form-step" id="step-2">
                    <h3 class="mb-4 text-primary"><i class="fas fa-tools me-2"></i>Select Your Services</h3>
                    <p class="text-muted">Choose all the services you are an expert in.</p>
                    <div class="row g-3">
                        <!-- Service Items -->
                        <div class="col-md-4 col-6"><label class="service-box"><input type="checkbox" name="services"><i class="fas fa-bolt"></i><span>Electrician</span></label></div>
                        <div class="col-md-4 col-6"><label class="service-box"><input type="checkbox" name="services"><i class="fas fa-tint"></i><span>Plumber</span></label></div>
                        <div class="col-md-4 col-6"><label class="service-box"><input type="checkbox" name="services"><i class="fas fa-paint-roller"></i><span>Painter</span></label></div>
                        <div class="col-md-4 col-6"><label class="service-box"><input type="checkbox" name="services"><i class="fas fa-fan"></i><span>AC Service</span></label></div>
                        <div class="col-md-4 col-6"><label class="service-box"><input type="checkbox" name="services"><i class="fas fa-couch"></i><span>Carpenter</span></label></div>
                        <div class="col-md-4 col-6"><label class="service-box"><input type="checkbox" name="services"><i class="fas fa-broom"></i><span>Cleaning</span></label></div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <button type="button" class="btn btn-secondary btn-lg prev-btn"><i class="fas fa-arrow-left me-2"></i> Previous</button>
                        <button type="button" class="btn btn-primary btn-lg next-btn">Next <i class="fas fa-arrow-right ms-2"></i></button>
                    </div>
                </div>

                <!-- Step 3: KYC Upload -->
                <div class="form-step" id="step-3">
                    <h3 class="mb-4 text-primary"><i class="fas fa-id-card me-2"></i>KYC Verification</h3>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <h5>Aadhar Card</h5>
                            <div class="upload-box">
                                <input type="file" id="aadhar-upload" class="file-input" accept="image/*,.pdf">
                                <label for="aadhar-upload" class="upload-label">
                                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                                    <p class="upload-text">Click to browse or drag & drop</p>
                                </label>
                                <div class="preview-container">
                                    <img src="" class="preview-image" alt="Aadhar Preview">
                                    <button type="button" class="remove-btn">×</button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <h5>PAN Card</h5>
                            <div class="upload-box">
                                <input type="file" id="pan-upload" class="file-input" accept="image/*,.pdf">
                                <label for="pan-upload" class="upload-label">
                                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                                    <p class="upload-text">Click to browse or drag & drop</p>
                                </label>
                                <div class="preview-container">
                                    <img src="" class="preview-image" alt="PAN Preview">
                                    <button type="button" class="remove-btn">×</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <button type="button" class="btn btn-secondary btn-lg prev-btn"><i class="fas fa-arrow-left me-2"></i> Previous</button>
                        <button type="submit" class="btn btn-success btn-lg"><i class="fas fa-check-circle me-2"></i>Submit for Verification</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Bootstrap & Custom JS -->
    


    
    
    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script_register.js"></script> <!-- <<< UPDATED FILE NAME HERE -->

</body>
</html>
