<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard - FixLeos</title>
    <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css"> <!-- We will update this file -->
</head>
<body>

<div class="d-flex" id="wrapper">
    <!-- Sidebar (Same as before) -->
    <div class="bg-dark border-right" id="sidebar-wrapper">
        <div class="sidebar-heading text-white">FIXLEOS Partner</div>
        <div class="list-group list-group-flush">
            <a href="index.html" class="list-group-item list-group-item-action bg-dark text-white active"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
            <a href="profile.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="fas fa-user-cog me-2"></i>Profile & Services</a>
            <a href="earnings.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="fas fa-wallet me-2"></i>Earnings</a>
            <a href="login_provider.html" class="list-group-item list-group-item-action bg-dark text-white"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
        </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-primary" id="menu-toggle"><i class="fas fa-bars"></i></button>
                <div class="ms-auto">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="availabilityToggle" checked>
                        <label class="form-check-label" for="availabilityToggle">Accepting Jobs</label>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container-fluid p-4">
            <!-- New Booking Requests Section -->
            <div id="new-requests-section">
                <h3 class="mb-3">
                    <i class="fas fa-bell text-warning me-2"></i>New Booking Requests <span class="badge bg-danger ms-2" id="new-requests-count">3</span>
                </h3>
                <div id="new-requests-container">
                    <!-- JS will populate this section with booking cards -->
                </div>
            </div>

            <hr class="my-5">

            <!-- Accepted/Ongoing Jobs Section -->
            <div id="ongoing-jobs-section">
                <h3 class="mb-3"><i class="fas fa-tasks text-primary me-2"></i>Ongoing Jobs</h3>
                <div id="ongoing-jobs-container">
                    <!-- JS will populate this section -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Booking Details Modal -->
<div class="modal fade" id="bookingDetailsModal" tabindex="-1" aria-labelledby="bookingDetailsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="bookingDetailsModalLabel">Booking Details</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4" id="modal-body-content">
        <!-- JS will populate this content -->
      </div>
      <div class="modal-footer" id="modal-footer-actions">
        <!-- JS will populate action buttons (Accept/Reject) -->
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification Container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
  <div id="actionToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto" id="toast-title"></strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="toast-body">
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script> <!-- We will update this file -->

</body>
</html>
