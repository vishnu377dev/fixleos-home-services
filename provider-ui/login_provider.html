<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login - FixLeos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-4">
                <img src="assets/logo.png" alt="FixLeos Logo" style="width: 120px;">
                <h2 class="mt-3">Partner Login</h2>
            </div>
            <form action="index.html"> <!-- Action ko dashboard page (index.html) pe point karein -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control form-control-lg" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                    <a href="#">Forgot password?</a>
                </div>
                <div class="d-grid">
                    
                    <button class="btn btn-primary btn-lg" onclick="window.location.href='service-provider-app/index.html'">Login</button>

                    
                   
                </div>
                <p class="text-center mt-4">
                    Don't have an account? <a href="register_partner.html">Sign Up</a>
                </p>
            </form>
        </div>
    </div>
    
</body>
</html>
