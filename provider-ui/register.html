<!-- Partner registration & KYC -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head content from Step 2 goes here -->
     <!-- Dashboard for booking requests -->
<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">

<title>Service Provider Panel</title>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="text-center mb-4">
        <img src="assets/logo.png" alt="FixLeos Logo" style="width: 150px;">
        <h2>Become a Partner</h2>
        <p class="text-muted">Join our network of trusted professionals</p>
    </div>
    <div class="card p-4 shadow-sm">
        <h3 class="mb-3">1. Personal & Business Information</h3>
        <form>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phoneNumber" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phoneNumber" placeholder="Enter your mobile number">
                </div>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea class="form-control" id="address" rows="2" placeholder="Your full address"></textarea>
            </div>
            
            <hr class="my-4">
            
            <h3 class="mb-3">2. KYC Verification</h3>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="panCard" class="form-label">PAN Card Upload</label>
                    <input class="form-control" type="file" id="panCard">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="aadharCard" class="form-label">Aadhar Card Upload</label>
                    <input class="form-control" type="file" id="aadharCard">
                </div>
            </div>

            <hr class="my-4">

            <h3 class="mb-3">3. Select Your Services</h3>
            <p>Choose the services you provide.</p>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="acRepair">
                        <label class="form-check-label" for="acRepair">AC Repair</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="plumbing">
                        <label class="form-check-label" for="plumbing">Plumbing</label>
                    </div>
                </div>
                <div class="col-md-4">
                     <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="carpentry">
                        <label class="form-check-label" for="carpentry">Carpentry</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="electrical">
                        <label class="form-check-label" for="electrical">Electrical Work</label>
                    </div>
                </div>
                <div class="col-md-4">
                     <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="cleaning">
                        <label class="form-check-label" for="cleaning">Cleaning</label>
                    </div>
                     <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="painting">
                        <label class="form-check-label" for="painting">House Painting</label>
                    </div>
                </div>
            </div>
            
            <div class="d-grid mt-4">
                 <button type="submit" class="btn btn-primary btn-lg">Submit for Verification</button>
            </div>
        </form>
    </div>
</div>

<!-- Scripts from Step 2 go here -->
 

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="js/script.js"></script>

</body>
</html>
